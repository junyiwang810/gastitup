<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Gas Map — Ottawa</title>
  <meta name="description" content="Calculate the true cost of driving to a cheaper gas station in Ottawa, accounting for traffic, city driving penalties, and time-of-day pricing." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&family=Sora:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="app"></div>

  <!-- External libraries (order matters) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Business logic (no DOM deps, safe to load before Vue mounts) -->
  <script src="js/data.js"></script>
  <script src="js/GasStation.js"></script>
  <script src="js/TimeConditions.js"></script>
  <script src="js/MapManager.js"></script>
  <script src="js/carData.js"></script>
  <script src="js/OBDManager.js"></script>

  <!-- Vue app -->
  <script src="js/vue-app.js"></script>
</body>
</html>
